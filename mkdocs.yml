site_name: VERDICT DFIR Documentation
site_description: VERDICT — evidence-bound DFIR with signed, offline-verifiable verdicts
site_url: https://timothyvang.github.io/verdict-dfir/
repo_url: https://github.com/TimothyVang/verdict-dfir
repo_name: TimothyVang/verdict-dfir
edit_uri: edit/master/docs/

exclude_docs: |
  README.md
  DATASET.md
  analyst/**
  artifact-semantics.md
  codex-compatibility.md
  competitive-analysis.md
  demo-script-a2.md
  diagrams/**
  divergences-resolved.md
  extending-the-tool-surface.md
  finding-to-action.md
  glossary.md
  investigation-phases.md
  legacy/**
  live-test-matrix.md
  onboarding.md
  plans/**
  replay-determinism.md
  repo-guide.md
  references/**
  release-evidence/*.json
  reports/**
  runbooks/**
  sample-run/**
  showcase/**
  specs/**
  templates/**
  using/whole-case-local-run.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Running VERDICT: using/running-verdict.md
  - Architecture: architecture.md
  - Accuracy:
      - Accuracy Report: accuracy-report.md
      - Evidence Answer Keys: evidence-answer-keys.md
  - Trust Model:
      - Cryptographic Attestation: cryptographic-attestation.md
      - Verdict Semantics: verdict-semantics.md
      - False Positives: false-positives.md
      - Red-Team Challenge: red-team-challenge.md
  - Reference:
      - MCP Servers and Tools: reference/mcp-and-tools.md
      - Dependencies: reference/dependencies.md
      - Environment Variables: reference/environment-variables.md
  - Operators:
      - Fleet Analysis: using/fleet-analysis.md
      - Evidence Intake: using/evidence-intake.md
      - Reports: using/reports.md
      - Troubleshooting: troubleshooting.md
  - Release:
      - Release Surface: release-surface.md
      - Release Evidence: release-evidence/README.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

plugins:
  - search
