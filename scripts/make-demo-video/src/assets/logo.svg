<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320" role="img" aria-label="VERDICT — DFIR at machine speed.">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&amp;display=swap');
    </style>
    <!-- Gavel gradient -->
    <linearGradient id="gavelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#6c3483"/>
    </linearGradient>
    <!-- Chain link gradient -->
    <linearGradient id="chainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b949e"/>
      <stop offset="100%" stop-color="#30363d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="320" rx="16" fill="#0d1117"/>
  <rect width="480" height="320" rx="16" fill="none" stroke="#9b59b6" stroke-width="1.5" opacity="0.6"/>

  <!-- Gavel head -->
  <g transform="translate(52, 48)">
    <!-- Handle -->
    <rect x="62" y="68" width="10" height="88" rx="5" fill="#30363d" transform="rotate(-35 67 112)"/>
    <!-- Gavel block -->
    <rect x="8" y="16" width="80" height="36" rx="8" fill="url(#gavelGrad)"/>
    <!-- Gavel highlight -->
    <rect x="8" y="16" width="80" height="12" rx="8" fill="#b17fd4" opacity="0.4"/>
    <!-- Strike line 1 -->
    <line x1="100" y1="8" x2="116" y2="2" stroke="#9b59b6" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <!-- Strike line 2 -->
    <line x1="106" y1="22" x2="124" y2="20" stroke="#9b59b6" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <!-- Strike line 3 -->
    <line x1="100" y1="36" x2="116" y2="42" stroke="#9b59b6" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Chain links -->
  <g transform="translate(52, 148)" opacity="0.75">
    <!-- Link 1 -->
    <ellipse cx="16" cy="12" rx="14" ry="9" fill="none" stroke="url(#chainGrad)" stroke-width="4"/>
    <!-- Link 2 -->
    <ellipse cx="42" cy="12" rx="14" ry="9" fill="none" stroke="url(#chainGrad)" stroke-width="4"/>
    <!-- Link 3 -->
    <ellipse cx="68" cy="12" rx="14" ry="9" fill="none" stroke="url(#chainGrad)" stroke-width="4"/>
    <!-- Sigstore checkmark on last link -->
    <circle cx="98" cy="12" r="11" fill="#2ecc71" opacity="0.9"/>
    <polyline points="93,12 97,16 104,8" fill="none" stroke="#0d1117" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- VERDICT wordmark -->
  <text x="200" y="96" font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="64" font-weight="800" fill="#e6edf3" letter-spacing="6">
    VERDICT
  </text>

  <!-- Divider line -->
  <line x1="200" y1="114" x2="450" y2="114" stroke="#9b59b6" stroke-width="1.5" opacity="0.5"/>

  <!-- Tagline -->
  <text x="200" y="142" font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="19" font-weight="400" fill="#8b949e" letter-spacing="2">
    DFIR at machine speed.
  </text>

  <!-- Powered by badge -->
  <text x="200" y="174" font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="14" font-weight="400" fill="#30363d" letter-spacing="1">
    Investigate · Verify · Prove
  </text>

  <!-- Confidence chips row -->
  <g transform="translate(200, 198)">
    <!-- CONFIRMED -->
    <rect width="108" height="26" rx="5" fill="#2ecc71" opacity="0.15"/>
    <rect width="108" height="26" rx="5" fill="none" stroke="#2ecc71" stroke-width="1" opacity="0.6"/>
    <text x="54" y="17" font-family="'JetBrains Mono', 'Courier New', monospace"
          font-size="11" font-weight="700" fill="#2ecc71" text-anchor="middle" letter-spacing="1">
      CONFIRMED
    </text>
    <!-- INFERRED -->
    <rect x="118" width="98" height="26" rx="5" fill="#f39c12" opacity="0.15"/>
    <rect x="118" width="98" height="26" rx="5" fill="none" stroke="#f39c12" stroke-width="1" opacity="0.6"/>
    <text x="167" y="17" font-family="'JetBrains Mono', 'Courier New', monospace"
          font-size="11" font-weight="700" fill="#f39c12" text-anchor="middle" letter-spacing="1">
      INFERRED
    </text>
    <!-- HYPOTHESIS -->
    <rect x="226" width="116" height="26" rx="5" fill="#3498db" opacity="0.15"/>
    <rect x="226" width="116" height="26" rx="5" fill="none" stroke="#3498db" stroke-width="1" opacity="0.6"/>
    <text x="284" y="17" font-family="'JetBrains Mono', 'Courier New', monospace"
          font-size="11" font-weight="700" fill="#3498db" text-anchor="middle" letter-spacing="1">
      HYPOTHESIS
    </text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="306" width="480" height="4" rx="0 0 16 16" fill="#9b59b6" opacity="0.8"/>
</svg>
