name: Devpost Submit

# Glue Spec #4 §9. Triggered by `git push origin v-submit`.
# Waits for release.yml to finish, assembles find-evil-submission.zip
# via scripts/package-devpost.sh, uploads to the GH Release, posts
# #releases Slack. Manual Devpost form upload follows.

on:
  push:
    tags: ['v-submit']

permissions:
  contents: write

jobs:
  wait-release:
    name: Wait for release.yml to finish on v-submit
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    outputs:
      ok: ${{ steps.wait.outputs.ok }}
    steps:
      - uses: actions/checkout@v4
      - name: Poll for successful release.yml
        id: wait
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 1800 ))  # 30 min
          while [[ $(date +%s) -lt ${deadline} ]]; do
            if gh run list \
              --workflow=release.yml \
              --status=success \
              --limit=5 \
              --json headSha \
              --jq --arg sha "${{ github.sha }}" \
                '[.[] | select(.headSha == $sha)] | length' \
              | grep -qv '^0$'; then
              echo "ok=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 120
          done
          echo "ok=false" >> "$GITHUB_OUTPUT"
          exit 1

  package:
    name: Assemble submission zip
    needs: wait-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify DEMO_VIDEO_URL set
        env:
          DEMO_VIDEO_URL: ${{ vars.DEMO_VIDEO_URL }}
        run: |
          if [[ -z "${DEMO_VIDEO_URL}" ]]; then
            echo "::error::DEMO_VIDEO_URL is empty. Set with:"
            echo "::error::  gh variable set DEMO_VIDEO_URL --body 'https://youtu.be/<id>'"
            exit 1
          fi

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download v-submit --dir release-assets --pattern '*' || true
          ls -lh release-assets/

      - name: Download latest weekly L3 verdicts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs/l3
          # Most recent successful weekly-golden run.
          run_id=$(gh run list \
            --workflow=l3-weekly-goldens.yml \
            --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [[ -n "${run_id:-}" ]]; then
            gh run download "${run_id}" --name l3-weekly-verdicts --dir logs/l3 || true
          fi

      - name: Convert verdicts to CSV
        run: |
          python3 scripts/json-to-benchmark-csv.py logs/l3 > benchmark-results.csv || \
            echo 'fixture,findings_matched' > benchmark-results.csv
          cat benchmark-results.csv

      - name: Run package-devpost.sh
        env:
          DEMO_VIDEO_URL: ${{ vars.DEMO_VIDEO_URL }}
          RELEASE_TAG: ${{ github.ref_name }}
          ACCURACY: ${{ vars.LAST_KNOWN_ACCURACY || '0' }}
          DATE: ${{ github.event.head_commit.timestamp || github.event.ref }}
        run: |
          bash scripts/package-devpost.sh
          ls -lh find-evil-submission.zip

      - name: Upload to GH Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v-submit find-evil-submission.zip --clobber

      - name: Slack #releases
        if: env.SLACK_WEBHOOK_RELEASES != ''
        env:
          SLACK_WEBHOOK_RELEASES: ${{ secrets.SLACK_WEBHOOK_RELEASES }}
        run: |
          msg="[find-evil CI] devpost-submit | PASS | ${GITHUB_SHA:0:7} | ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/v-submit
          Devpost package ready — find-evil-submission.zip uploaded. Download it and attach to the Devpost form manually."
          curl -fsSL -X POST "${SLACK_WEBHOOK_RELEASES}" \
            -H 'Content-Type: application/json' \
            -d "$(jq -nR --arg t "$msg" '{text:$t}')" \
            || true
