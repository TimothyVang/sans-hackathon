name: L0 Static Checks

# Spec #3 §4.1 — fastest possible structural gate on PRs and branch pushes.
# Runs on every change. Required status check on main (see glue Spec #4 §6).
# Budget: 30-60s wall clock on ubuntu-24.04.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: l0-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  workflow-lint:
    name: actionlint + yamllint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: actionlint (GitHub Actions workflows)
        uses: raven-actions/actionlint@v2
        with:
          files: '.github/workflows/*.yml'
      - name: yamllint
        run: |
          pip install --quiet yamllint
          yamllint --format github .github/ docker/ 2>/dev/null || yamllint --format github .github/

  shell-lint:
    name: shellcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck (*.sh under scripts/)
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
          scandir: './scripts'
          format: gcc

  dockerfile-lint:
    name: hadolint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: hadolint on docker/*.Dockerfile (if present)
        run: |
          if ls docker/*.Dockerfile >/dev/null 2>&1; then
            docker run --rm -i hadolint/hadolint:v2.12.0 \
              < docker/l1-devbase.Dockerfile || true
          else
            echo "No Dockerfiles yet — skip."
          fi

  python-lint:
    name: ruff check + format --check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: install ruff
        run: pip install 'ruff==0.7.4'
      - name: ruff check
        run: |
          if [ -f pyproject.toml ] || find . -maxdepth 3 -name '*.py' -not -path './*/venv/*' -print -quit | grep -q .; then
            ruff check .
          else
            echo "No Python sources yet — skip."
          fi
      - name: ruff format --check
        run: |
          if [ -f pyproject.toml ] || find . -maxdepth 3 -name '*.py' -not -path './*/venv/*' -print -quit | grep -q .; then
            ruff format --check .
          else
            echo "No Python sources yet — skip."
          fi

  rust-lint:
    name: cargo check + clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.83.0
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo check --workspace
        run: |
          if [ -f Cargo.toml ]; then
            cargo check --workspace --locked
          else
            echo "No Rust workspace yet — skip."
          fi
      - name: cargo clippy --deny warnings
        run: |
          if [ -f Cargo.toml ]; then
            cargo clippy --workspace --all-targets --locked -- -D warnings
          else
            echo "No Rust workspace yet — skip."
          fi
      - name: cargo fmt --check
        run: |
          if [ -f Cargo.toml ]; then
            cargo fmt --all --check
          else
            echo "No Rust workspace yet — skip."
          fi

  typescript-lint:
    name: tsc + eslint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - name: install
        run: |
          if [ -f pnpm-workspace.yaml ] || [ -f package.json ]; then
            pnpm install --frozen-lockfile
          else
            echo "No Node workspace yet — skip."
          fi
      - name: tsc --noEmit
        run: |
          if [ -f pnpm-workspace.yaml ]; then
            pnpm -r exec tsc --noEmit
          else
            echo "No TS workspace yet — skip."
          fi
      - name: eslint
        run: |
          if [ -f pnpm-workspace.yaml ]; then
            pnpm -r lint
          else
            echo "No TS workspace yet — skip."
          fi

  docs-consistency:
    name: docs cross-references intact
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: verify spec->plan cross-references
        run: |
          # Every spec must have a matching plan; every plan must cite its spec.
          for spec in docs/superpowers/specs/2026-04-23-layered-test-sandbox-design.md \
                     docs/superpowers/specs/2026-04-24-autonomous-build-swarm-design.md \
                     docs/superpowers/specs/2026-04-25-the-product-design.md \
                     docs/superpowers/specs/2026-04-26-orchestration-glue-design.md; do
            test -f "$spec" || { echo "missing spec: $spec"; exit 1; }
          done
          for plan in docs/superpowers/plans/2026-04-23-sandbox-plan.md \
                     docs/superpowers/plans/2026-04-23-build-swarm-plan.md \
                     docs/superpowers/plans/2026-04-23-product-plan.md \
                     docs/superpowers/plans/2026-04-23-orchestration-glue-plan.md; do
            test -f "$plan" || { echo "missing plan: $plan"; exit 1; }
          done
          test -f CLAUDE.md || { echo "missing CLAUDE.md"; exit 1; }
          test -f docs/DATASET.md || { echo "missing DATASET.md"; exit 1; }
          test -f docs/architecture.md || { echo "missing architecture.md"; exit 1; }
          echo "All required docs present."

  amendment-option-b-guard:
    name: Option-B Amendment invariants
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: swarm code must not reference LiteLLM or USD budget
        run: |
          # Only runs once services/swarm/ exists. Until then, skip.
          if [ -d services/swarm ]; then
            if grep -rn -E "litellm|ANTHROPIC_API_KEY|\\\$50 cap|max_budget" services/swarm/; then
              echo "ERROR: Option-B amendment forbids LiteLLM/USD-cap references in services/swarm/"
              echo "       See docs/superpowers/specs/2026-04-23-amendment-option-b-claude-code-mode.md"
              exit 1
            fi
            echo "Option-B compliance: OK (no prohibited references in services/swarm/)."
          else
            echo "No services/swarm/ yet — skip."
          fi
