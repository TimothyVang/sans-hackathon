services:
  # Spec #1 §7.1 + Amendment A1 — PostgresSaver backing store for the
  # build swarm's LangGraph StateGraph. NOT used by the Product; the
  # Product uses SqliteSaver per Spec #2 §4.2. Do not conflate.
  #
  # Start before swarm-start.sh:
  #   docker compose -f docker/swarm-postgres.yml up -d
  #
  # Health-checked; swarm-start.sh pre-flight waits for healthy state.
  postgres:
    image: postgres:16-alpine
    container_name: findevil-swarm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: swarm
      POSTGRES_USER: swarm
      # Local-only; this Postgres is bound to 127.0.0.1 below. Still,
      # real credentials should be sourced from a local .env file, not
      # committed. See services/swarm/config/postgres.env (gitignored).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swarm-local-only}
      # Durability tuning for an overnight single-writer workload.
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      # Bind to loopback — the swarm is on the same host.
      - "127.0.0.1:5432:5432"
    volumes:
      - swarm-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarm -d swarm"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    command:
      - postgres
      - -c
      - "max_connections=50"
      # WAL retention sized for a single overnight 8-hour run with
      # jshchnz/claude-code-scheduler cron at 23:00 local.
      - -c
      - "wal_compression=on"
      - -c
      - "log_statement=none"

volumes:
  swarm-pg-data:
    name: findevil-swarm-pg-data
