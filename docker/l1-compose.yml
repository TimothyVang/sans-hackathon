services:
  # Spec #3 §4.2 — L1 dev-base runs `cargo test / pytest / pnpm build+test`
  # inside an Ubuntu 22.04 image that matches SIFT's base. Used both for
  # local iteration and inside GHA (.github/workflows/l1-unit.yml).
  #
  # Usage:
  #   docker compose -f docker/l1-compose.yml up --build --exit-code-from l1
  #
  # The `--exit-code-from l1` surfaces L1's exit code so CI fails on a
  # red test run without parsing logs.
  l1:
    build:
      context: ..
      dockerfile: docker/l1-devbase.Dockerfile
      args:
        DEV_UID: "${UID:-1000}"
        DEV_GID: "${GID:-1000}"
    image: findevil/l1-devbase:local
    container_name: findevil-l1
    # Running as `dev` matches the unprivileged-user invariant from Spec #2 §1.
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /workspace
    volumes:
      # Mount repo read-write for test output (target/, .pytest_cache/, etc.).
      - ..:/workspace
      # Share cargo / pnpm / uv caches across runs for speed.
      - l1-cargo-registry:/home/dev/.cargo/registry
      - l1-cargo-git:/home/dev/.cargo/git
      - l1-cargo-target:/workspace/target
      - l1-uv-cache:/home/dev/.cache/uv
      - l1-pnpm-store:/home/dev/.local/share/pnpm/store
    environment:
      CARGO_HOME: /home/dev/.cargo
      RUSTFLAGS: "-D warnings"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      UV_CACHE_DIR: /home/dev/.cache/uv
      UV_SYSTEM_PYTHON: "true"
    # Self-skipping test sequence — matches the command exact-match in
    # BUILD_PLAN_v2.md §10 and sandbox plan Task 3.
    command:
      - bash
      - -lc
      - |
        set -euo pipefail

        if [ -f Cargo.toml ]; then
          echo "== cargo test --workspace --locked =="
          cargo test --workspace --locked
          echo "== cargo build --release --locked =="
          cargo build --workspace --release --locked
        else
          echo "-- no Cargo.toml yet, skipping Rust --"
        fi

        # Run pytest in every services/*/pyproject.toml directory. There is
        # no repo-root pyproject — each Python service is its own uv project
        # (services/agent, services/agent_mcp, services/swarm) so we iterate.
        python_any=false
        for proj in services/agent services/agent_mcp services/swarm; do
          if [ -f "$proj/pyproject.toml" ]; then
            python_any=true
            echo "== ($proj) uv sync --extra dev =="
            (cd "$proj" && (uv sync --extra dev --frozen 2>/dev/null || uv sync --extra dev))
            echo "== ($proj) uv run pytest -xvs --cov =="
            (cd "$proj" && uv run pytest -xvs --cov)
          fi
        done
        if [ "$python_any" = "false" ]; then
          echo "-- no Python projects yet, skipping --"
        fi

        if [ -f pnpm-workspace.yaml ] || [ -f package.json ]; then
          echo "== pnpm install --frozen-lockfile =="
          pnpm install --frozen-lockfile
          echo "== pnpm -r build =="
          pnpm -r build
          echo "== pnpm -r test =="
          pnpm -r test
        else
          echo "-- no pnpm workspace yet, skipping Node --"
        fi

        # End-to-end MCP smoke. cargo build --release above already
        # produced target/release/findevil-mcp; agent_mcp's uv venv
        # was synced. Both smokes spawn the server as a subprocess
        # over stdio JSON-RPC and assert tool registration + error
        # paths. Failure here is more informative than a unit-test
        # failure because it catches integration drift between the
        # tool registration table, the dispatcher, and the
        # ToolAnnotations schema all at once.
        if [ -x target/release/findevil-mcp ] && [ -f scripts/rust-mcp-smoke.py ]; then
          echo "== scripts/rust-mcp-smoke.py (Rust MCP end-to-end) =="
          # rust-mcp-smoke spawns target/release/findevil-mcp directly
          python3 scripts/rust-mcp-smoke.py
        else
          echo "-- skipping rust-mcp-smoke (binary or script absent) --"
        fi

        if [ -d services/agent_mcp ] && [ -f scripts/agent-mcp-smoke.py ]; then
          echo "== scripts/agent-mcp-smoke.py (Python agent_mcp end-to-end) =="
          uv run --directory services/agent_mcp python ../../scripts/agent-mcp-smoke.py
        else
          echo "-- skipping agent-mcp-smoke (services/agent_mcp or script absent) --"
        fi

        echo "L1 complete."

volumes:
  l1-cargo-registry:
  l1-cargo-git:
  l1-cargo-target:
  l1-uv-cache:
  l1-pnpm-store:
