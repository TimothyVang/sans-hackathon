# docker/verdict-compose.yml — reproducible VERDICT runner.
#
# Build once, then run an investigation with read-only evidence and persisted
# output. Set ONE credential mode (CLAUDE.md sec 8) before running:
#
#   export CLAUDE_CODE_OAUTH_TOKEN=...                 # or ANTHROPIC_API_KEY=...
#   mkdir -p out
#   EVIDENCE=tmp/evidence/base-dc-memory.img \
#     docker compose -f docker/verdict-compose.yml run --rm verdict
#
# Inside the container:  claude    then:   investigate /evidence/case
# Output (signed run + audit.jsonl) lands on the host under ./out/auto-runs/<case>/.
#
# scripts/verdict-docker wraps this with credential auto-detection + an evidence
# existence check; prefer it for day-to-day use.
services:
  verdict:
    build:
      context: ..
      dockerfile: docker/verdict-runner.Dockerfile
    image: verdict-runner:local
    volumes:
      # Evidence: read-only, so no tool can mutate the original.
      - type: bind
        source: ${EVIDENCE:?set EVIDENCE=/path/to/evidence}
        target: /evidence/case
        read_only: true
      # Output: find_evil_auto.py writes REPO_ROOT/tmp/auto-runs/<case>/, so
      # mount the host output dir over /workspace/tmp (create it first; it must
      # be owned by host uid 1000 to match the in-image `verdict` user).
      - type: bind
        source: ${OUTPUT_DIR:-../out}
        target: /workspace/tmp
    environment:
      # Pass through whichever credential mode is set on the host (empty = unset).
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Pin the model id for run-to-run consistency (see the runbook).
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
    working_dir: /workspace
    stdin_open: true
    tty: true
